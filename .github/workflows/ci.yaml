name: CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml || bandit -r src/ -s B101,B105

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=pybticino --cov-report=term-missing

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install mypy types-requests
          pip install -e ".[test]"
      - name: Run mypy
        run: mypy src/pybticino || true

  ci-gate:
    name: CI gate
    if: always()
    needs: [lint, security, tests, typecheck]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint failed"; exit 1
          fi
          if [[ "${{ needs.tests.result }}" != "success" ]]; then
            echo "Tests failed"; exit 1
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "Security scan failed (warning)"
          fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "Type checking failed (warning)"
          fi
          echo "All checks passed"
