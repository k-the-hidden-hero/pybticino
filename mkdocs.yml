site_name: pybticino
site_description: Async Python library for the BTicino/Netatmo API
site_url: https://k-the-hidden-hero.github.io/pybticino/
repo_url: https://github.com/k-the-hidden-hero/pybticino
repo_name: k-the-hidden-hero/pybticino

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - AuthHandler: api/auth.md
    - AsyncAccount: api/account.md
    - WebsocketClient: api/websocket.md
    - SignalingClient: api/signaling.md
    - Models: api/models.md
    - Exceptions: api/exceptions.md
  - WebSocket Events: websocket-events.md
  - WebRTC:
    - Signaling Protocol: webrtc-signaling.md
    - Audio Mechanism: webrtc-audio.md
    - Reverse Engineering Notes: reverse-engineering-notes.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
